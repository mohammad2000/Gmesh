syntax = "proto3";

package gmesh.v1;

option go_package = "github.com/mohammad2000/Gmesh/gen/gmesh/v1;gmeshv1";

// GMesh is the control-plane API exposed by the gmeshd daemon over a Unix
// socket. The GritivaCore agent, gmeshctl, and any other local process talks
// to gmeshd through this service.
//
// All mutating RPCs are idempotent on the {peer_id, mesh_ip} primary key.
service GMesh {
  // ── Lifecycle ─────────────────────────────────────────────────────────
  rpc Join    (JoinRequest)    returns (JoinResponse);
  rpc Leave   (LeaveRequest)   returns (LeaveResponse);
  rpc Status  (StatusRequest)  returns (StatusResponse);
  rpc Version (VersionRequest) returns (VersionResponse);

  // ── Peers ─────────────────────────────────────────────────────────────
  rpc AddPeer      (AddPeerRequest)      returns (AddPeerResponse);
  rpc RemovePeer   (RemovePeerRequest)   returns (RemovePeerResponse);
  rpc UpdatePeer   (UpdatePeerRequest)   returns (UpdatePeerResponse);
  rpc ListPeers    (ListPeersRequest)    returns (ListPeersResponse);
  rpc GetPeerStats (GetPeerStatsRequest) returns (GetPeerStatsResponse);

  // ── NAT & traversal ───────────────────────────────────────────────────
  rpc DiscoverNAT (DiscoverNATRequest) returns (DiscoverNATResponse);
  rpc HolePunch   (HolePunchRequest)   returns (HolePunchResponse);

  // ── Relay / WS tunnel ─────────────────────────────────────────────────
  rpc SetupRelay       (SetupRelayRequest)       returns (SetupRelayResponse);
  rpc AllocateWSTunnel (AllocateWSTunnelRequest) returns (AllocateWSTunnelResponse);

  // ── Health ────────────────────────────────────────────────────────────
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);

  // ── Scopes (netns-isolated peers behind a VM) ─────────────────────────
  rpc ScopeConnect    (ScopeConnectRequest)    returns (ScopeConnectResponse);
  rpc ScopeDisconnect (ScopeDisconnectRequest) returns (ScopeDisconnectResponse);

  // ── Firewall (nftables) ───────────────────────────────────────────────
  rpc ApplyFirewall     (ApplyFirewallRequest)     returns (ApplyFirewallResponse);
  rpc ResetFirewall     (ResetFirewallRequest)     returns (ResetFirewallResponse);
  rpc GetFirewallStatus (GetFirewallStatusRequest) returns (GetFirewallStatusResponse);

  // ── Event stream ──────────────────────────────────────────────────────
  // Server-streaming RPC. Subscribers get async events: peer state changes,
  // NAT re-discovery, health degradation, firewall apply results, etc.
  rpc SubscribeEvents (SubscribeEventsRequest) returns (stream Event);

  // ── Egress profiles (Phase 11) ────────────────────────────────────────
  // An egress profile routes selected outbound traffic through a specific
  // mesh peer acting as an "exit node" instead of the local default gateway.
  rpc CreateEgressProfile (CreateEgressProfileRequest) returns (EgressProfileResponse);
  rpc UpdateEgressProfile (UpdateEgressProfileRequest) returns (EgressProfileResponse);
  rpc DeleteEgressProfile (DeleteEgressProfileRequest) returns (DeleteEgressProfileResponse);
  rpc ListEgressProfiles  (ListEgressProfilesRequest)  returns (ListEgressProfilesResponse);

  // Exit-side operations: called on the peer that acts as an exit node.
  // EnableExit installs MASQUERADE + FORWARD rules so forwarded traffic
  // egresses correctly; DisableExit tears them down.
  rpc EnableExit  (EnableExitRequest)  returns (EnableExitResponse);
  rpc DisableExit (DisableExitRequest) returns (DisableExitResponse);

  // ── Ingress profiles (Phase 12) ───────────────────────────────────────
  // Expose a backend service (running on another mesh peer, optionally
  // inside a scope netns) on the edge peer's public address via nftables
  // DNAT. Inbound packets are tunneled over the mesh to the backend.
  rpc CreateIngressProfile (CreateIngressProfileRequest) returns (IngressProfileResponse);
  rpc UpdateIngressProfile (UpdateIngressProfileRequest) returns (IngressProfileResponse);
  rpc DeleteIngressProfile (DeleteIngressProfileRequest) returns (DeleteIngressProfileResponse);
  rpc ListIngressProfiles  (ListIngressProfilesRequest)  returns (ListIngressProfilesResponse);

  // ── Quotas (Phase 13) ────────────────────────────────────────────────
  // Byte-counter-driven policy attached to an EgressProfile. Emits events
  // when thresholds are crossed; optionally swaps traffic to a backup
  // profile automatically at the shift threshold.
  rpc CreateQuota   (CreateQuotaRequest)   returns (QuotaResponse);
  rpc UpdateQuota   (UpdateQuotaRequest)   returns (QuotaResponse);
  rpc DeleteQuota   (DeleteQuotaRequest)   returns (DeleteQuotaResponse);
  rpc ListQuotas    (ListQuotasRequest)    returns (ListQuotasResponse);
  rpc GetQuotaUsage (GetQuotaUsageRequest) returns (GetQuotaUsageResponse);
  rpc ResetQuota    (ResetQuotaRequest)    returns (ResetQuotaResponse);

  // ── Path Monitor (Phase 14) ──────────────────────────────────────────
  // Reads the active path-probe state maintained by pathmon. The monitor
  // auto-syncs targets from the peer registry every 30s; this RPC is a
  // point-in-time snapshot of RTT, loss and up/down status.
  rpc ListPathStates (ListPathStatesRequest) returns (ListPathStatesResponse);

  // ── Policies (Phase 17) ──────────────────────────────────────────────
  // List the active policies and force a reload from disk.
  rpc ListPolicies   (ListPoliciesRequest)   returns (ListPoliciesResponse);
  rpc ReloadPolicies (ReloadPoliciesRequest) returns (ReloadPoliciesResponse);

  // ── L7 classifier (Phase 18) ─────────────────────────────────────────
  // Per-protocol traffic visibility. Classification is port-based
  // today — see docs/l7.md for the scope caveat (eBPF DPI is a
  // follow-up).
  rpc ListL7Flows  (ListL7FlowsRequest)  returns (ListL7FlowsResponse);
  rpc ListL7Totals (ListL7TotalsRequest) returns (ListL7TotalsResponse);

  // ── Anomaly alerts (Phase 21) ────────────────────────────────────────
  // Recent alerts produced by the built-in detectors (bandwidth z-score,
  // handshake storm, peer flap). Full live stream is available on the
  // event bus as type `anomaly_alert`.
  rpc ListAnomalies (ListAnomaliesRequest) returns (ListAnomaliesResponse);

  // ── Circuits / onion paths (Phase 19) ────────────────────────────────
  // A multi-hop source-routed path through the mesh. See docs/circuit.md
  // for the role model (source/transit/exit) and security posture.
  rpc CreateCircuit (CreateCircuitRequest) returns (CircuitResponse);
  rpc UpdateCircuit (UpdateCircuitRequest) returns (CircuitResponse);
  rpc DeleteCircuit (DeleteCircuitRequest) returns (DeleteCircuitResponse);
  rpc ListCircuits  (ListCircuitsRequest)  returns (ListCircuitsResponse);

  // ── mTLS / SPIFFE identity (Phase 20) ────────────────────────────────
  // Small embedded CA: bootstrap once per mesh, issue short-lived peer
  // certs with SPIFFE IDs, track revocations. The root cert can be
  // handed to any peer that wants to terminate or validate TLS.
  rpc InitCA        (InitCARequest)        returns (InitCAResponse);
  rpc CAStatus      (CAStatusRequest)      returns (CAStatusResponse);
  rpc IssueCert     (IssueCertRequest)     returns (IssueCertResponse);
  rpc ListCerts     (ListCertsRequest)     returns (ListCertsResponse);
  rpc RevokeCert    (RevokeCertRequest)    returns (RevokeCertResponse);
  rpc ExportTrust   (ExportTrustRequest)   returns (ExportTrustResponse);
}

// ── Common types ────────────────────────────────────────────────────────

enum PeerType {
  PEER_TYPE_UNSPECIFIED = 0;
  PEER_TYPE_VM          = 1;
  PEER_TYPE_SCOPE       = 2;
}

enum PeerStatus {
  PEER_STATUS_UNSPECIFIED  = 0;
  PEER_STATUS_CONNECTING   = 1;
  PEER_STATUS_CONNECTED    = 2;
  PEER_STATUS_DISCONNECTED = 3;
  PEER_STATUS_ERROR        = 4;
  PEER_STATUS_ESTABLISHING = 5;
}

enum NATType {
  NAT_TYPE_UNSPECIFIED           = 0;
  NAT_TYPE_OPEN                  = 1;
  NAT_TYPE_FULL_CONE             = 2;
  NAT_TYPE_RESTRICTED_CONE       = 3;
  NAT_TYPE_PORT_RESTRICTED_CONE  = 4;
  NAT_TYPE_SYMMETRIC             = 5;
}

enum ConnectionMethod {
  CONN_METHOD_UNSPECIFIED       = 0;
  CONN_METHOD_DIRECT            = 1;
  CONN_METHOD_UPNP_PORT_MAP     = 2;
  CONN_METHOD_STUN_HOLE_PUNCH   = 3;
  CONN_METHOD_SIMULTANEOUS_OPEN = 4;
  CONN_METHOD_BIRTHDAY_PUNCH    = 5;
  CONN_METHOD_RELAY             = 6;
  CONN_METHOD_RELAY_TCP         = 7;
  CONN_METHOD_WS_TUNNEL         = 8;
}

enum HealthStatus {
  HEALTH_UNSPECIFIED = 0;
  HEALTH_EXCELLENT   = 1;
  HEALTH_GOOD        = 2;
  HEALTH_DEGRADED    = 3;
  HEALTH_POOR        = 4;
  HEALTH_FAILING     = 5;
}

message Peer {
  int64            id                = 1;
  PeerType         type              = 2;
  string           mesh_ip           = 3;   // 10.200.x.x
  string           public_key        = 4;
  string           endpoint          = 5;   // host:port (legacy: active/preferred endpoint)
  repeated string  allowed_ips       = 6;
  PeerStatus       status            = 7;
  NATType          nat_type          = 8;
  bool             supports_hole_punch = 9;
  bool             is_relay_capable  = 10;
  ConnectionMethod method            = 11;
  int64            rx_bytes          = 12;
  int64            tx_bytes          = 13;
  int64            latency_ms        = 14;
  double           packet_loss       = 15;
  int64            last_handshake_unix = 16;
  int64            scope_id          = 17;  // 0 for VM peers
  // All known endpoints for this peer, ordered by priority (lowest first).
  // Each is a PeerEndpoint carrying host:port + a type tag (lan/wan/stun/
  // relay) so the engine can race candidates. When populated, `endpoint`
  // (field 5) is the currently-selected/last-successful one.
  repeated PeerEndpoint endpoints   = 18;
}

// A single candidate address where a peer might be reachable.
message PeerEndpoint {
  // "host:port" format. For IPv6, host must be bracketed.
  string       address  = 1;
  // Where this candidate came from.
  EndpointType type     = 2;
  // Lower = better. Typical values: lan=10, wan=50, stun=60, relay=100.
  uint32       priority = 3;
  // Unix ms of last successful handshake/probe via this endpoint. 0 = never.
  int64        last_ok_unix_ms = 4;
}

enum EndpointType {
  ENDPOINT_UNSPECIFIED = 0;
  ENDPOINT_LAN         = 1;  // RFC1918 / link-local, same-subnet peers
  ENDPOINT_WAN         = 2;  // Public IP, either static or DNS-resolved
  ENDPOINT_STUN        = 3;  // Reflexive mapping discovered via STUN
  ENDPOINT_RELAY       = 4;  // DERP-style relay fallback
}

message NATInfo {
  NATType nat_type          = 1;
  string  external_ip       = 2;
  uint32  external_port     = 3;
  bool    supports_hole_punch = 4;
  bool    is_relay_capable  = 5;
}

// ── Lifecycle ──────────────────────────────────────────────────────────

message JoinRequest {
  string mesh_ip        = 1;   // 10.200.x.x/16 assigned by backend
  uint32 listen_port    = 2;   // local UDP port, e.g. 51820
  string interface_name = 3;   // "wg-gritiva"
  string network_cidr   = 4;   // "10.200.0.0/16"
  string node_id        = 5;   // "node-xxxxxxxx"
}

message JoinResponse {
  string  public_key            = 1;
  string  private_key_encrypted = 2;  // returned for backend storage (Fernet)
  NATInfo nat                   = 3;
  string  endpoint              = 4;  // external_ip:external_port (legacy)
  // Every address the daemon could plausibly be reachable at. Backend
  // stores these so other peers can race them. Populated by the daemon
  // enumerating its own interfaces + the NAT reflexive address.
  repeated PeerEndpoint endpoints = 5;
}

message LeaveRequest { string reason = 1; }
message LeaveResponse {}

message StatusRequest {}
message StatusResponse {
  bool            joined        = 1;
  string          mesh_ip       = 2;
  string          interface     = 3;
  NATInfo         nat           = 4;
  int32           peer_count    = 5;
  int32           active_peers  = 6;
  repeated Peer   peers         = 7;
  // Local node's WireGuard public key. Empty when not joined yet.
  // Used by the bridge translator to resolve the current pubkey after
  // an idempotent (ALREADY_EXISTS) mesh_join so the backend can update
  // its peer record without re-requesting a full join.
  string          public_key    = 8;
  // The port gmeshd is actually bound to. Pulled into mesh_joined
  // responses so the backend DB can track the runtime port (which may
  // differ from whatever the backend asked for in the join command).
  uint32          listen_port   = 9;
}

message VersionRequest {}
message VersionResponse { string version = 1; string commit = 2; string build_date = 3; }

// ── Peers ──────────────────────────────────────────────────────────────

message AddPeerRequest {
  int64            peer_id      = 1;
  string           mesh_ip      = 2;
  string           public_key   = 3;
  string           endpoint     = 4;
  repeated string  allowed_ips  = 5;
  uint32           keepalive    = 6;
  NATInfo          remote_nat   = 7;
  ConnectionMethod force_method = 8;  // UNSPECIFIED → let engine choose
  // Multi-endpoint candidate list. When non-empty the engine races
  // these in priority order and ignores `endpoint` (field 4). Stays
  // optional so older coordinators still work.
  repeated PeerEndpoint endpoints = 9;
}

message AddPeerResponse {
  Peer peer = 1;
}

message RemovePeerRequest  { int64 peer_id = 1; }
message RemovePeerResponse {}

message UpdatePeerRequest  {
  int64            peer_id     = 1;
  string           endpoint    = 2;
  repeated string  allowed_ips = 3;
  uint32           keepalive   = 4;
  // Replaces the peer's candidate list (if non-empty). Engine re-races.
  repeated PeerEndpoint endpoints = 5;
}
message UpdatePeerResponse { Peer peer = 1; }

message ListPeersRequest   {}
message ListPeersResponse  { repeated Peer peers = 1; }

message GetPeerStatsRequest  { int64 peer_id = 1; }
message GetPeerStatsResponse { Peer peer = 1; }

// ── NAT & traversal ────────────────────────────────────────────────────

message DiscoverNATRequest  { bool force_refresh = 1; }
message DiscoverNATResponse { NATInfo nat = 1; }

message HolePunchRequest {
  int64  peer_id           = 1;
  string remote_endpoint   = 2;
  int64  fire_at_unix_ms   = 3;  // for simultaneous-open coordination
}
message HolePunchResponse {
  bool             success    = 1;
  ConnectionMethod method_used = 2;
  int64            latency_ms = 3;
  string           error      = 4;
}

// ── Relay ──────────────────────────────────────────────────────────────

message SetupRelayRequest {
  int64  peer_id          = 1;
  string relay_endpoint   = 2;   // gmesh-relay address
  string relay_session_id = 3;
}
message SetupRelayResponse { bool ok = 1; string error = 2; }

message AllocateWSTunnelRequest  {
  int64  peer_id        = 1;
  string backend_ws_url = 2;  // wss://api.gritiva.com/ws/relay/{session}/{peer}
}
message AllocateWSTunnelResponse { bool ok = 1; string error = 2; }

// ── Health ─────────────────────────────────────────────────────────────

message HealthCheckRequest  { int64 peer_id = 1; /* 0 = all */ }
message HealthCheckResponse {
  message PeerHealth {
    int64        peer_id          = 1;
    HealthStatus status           = 2;
    int32        score            = 3;   // 0..100
    int64        latency_ms       = 4;
    double       packet_loss      = 5;
    int64        handshake_age_s  = 6;
  }
  repeated PeerHealth peers = 1;
}

// ── Scope peers (netns-isolated behind a VM) ───────────────────────────

message ScopeConnectRequest {
  int64           scope_id         = 1;
  string          scope_mesh_ip    = 2;   // 10.200.x.x (identity)
  string          scope_netns      = 3;   // "scope-{id}"
  string          veth_cidr        = 4;   // 10.50.{id}.0/30
  string          vm_veth_ip       = 5;   // 10.50.{id}.1
  string          scope_ip         = 6;   // 10.50.{id}.2
  string          gateway_mesh_ip  = 7;   // parent VM mesh_ip
  string          public_key       = 8;   // scope's own WG key (clean model)
  uint32          listen_port      = 9;
}
message ScopeConnectResponse { Peer peer = 1; }

message ScopeDisconnectRequest  { int64 scope_id = 1; }
message ScopeDisconnectResponse {}

// ── Firewall (nftables) ────────────────────────────────────────────────

enum FirewallAction {
  FW_ACTION_UNSPECIFIED = 0;
  FW_ACTION_ALLOW       = 1;
  FW_ACTION_DENY        = 2;
  FW_ACTION_LIMIT       = 3;
  FW_ACTION_LOG         = 4;
}

enum FirewallProtocol {
  FW_PROTO_UNSPECIFIED = 0;
  FW_PROTO_ANY         = 1;
  FW_PROTO_TCP         = 2;
  FW_PROTO_UDP         = 3;
  FW_PROTO_ICMP        = 4;
  FW_PROTO_ICMPV6      = 5;
}

message FirewallRule {
  int64            id           = 1;
  string           name         = 2;
  bool             enabled      = 3;
  int32            priority     = 4;
  FirewallAction   action       = 5;
  FirewallProtocol protocol     = 6;
  string           source       = 7;   // CIDR or "peer:NN" or "any"
  string           destination  = 8;
  string           port_range   = 9;   // "80", "80-443", "22,80,443"
  string           direction    = 10;  // "inbound" | "outbound" | "both"
  string           tcp_flags    = 11;
  string           conn_state   = 12;  // "NEW,ESTABLISHED,RELATED"
  string           rate_limit   = 13;  // "100/s" | "1000/m"
  uint32           rate_burst   = 14;
  string           schedule     = 15;  // JSON; cron-ish time windows
  int64            expires_at   = 16;
  repeated string  tags         = 17;
}

message ApplyFirewallRequest {
  repeated FirewallRule rules         = 1;
  bool                  force_reset   = 2;
  string                default_policy = 3; // "allow" | "deny"
}
message ApplyFirewallResponse {
  int32            applied_count = 1;
  int32            failed_count  = 2;
  repeated string  errors        = 3;
}

message ResetFirewallRequest  {}
message ResetFirewallResponse {}

message GetFirewallStatusRequest  {}
message GetFirewallStatusResponse {
  int32                 active_rules = 1;
  string                backend      = 2; // "nftables"
  repeated FirewallRule rules        = 3;
  map<int64,int64>      hit_counts   = 4;
}

// ── Event stream ───────────────────────────────────────────────────────

message SubscribeEventsRequest { repeated string types = 1; /* filter; empty = all */ }

message Event {
  int64  timestamp_unix_ms = 1;
  string type              = 2;  // "peer_connected", "peer_disconnected", "nat_changed", "health_update", "firewall_applied", ...
  string peer_id           = 3;
  string payload_json      = 4;  // structured payload as JSON (schema per type)
}

// ── Egress profile (Phase 11) ───────────────────────────────────────────

message EgressProfile {
  int64            id              = 1;
  string           name            = 2;
  bool             enabled         = 3;
  int32            priority        = 4;   // 0..1000, lower = earlier match

  // Match
  int64            source_scope_id = 5;   // 0 = source is the bare host
  string           source_cidr     = 6;   // optional, e.g. "10.50.42.0/30"
  string           protocol        = 7;   // "any" | "tcp" | "udp"
  string           dest_cidr       = 8;   // e.g. "0.0.0.0/0"
  string           dest_ports      = 9;   // "443" or "80,443" or ""

  // Phase 15 hook: GeoIP filter (country codes)
  repeated string  geoip_countries = 10;

  // Exit
  int64            exit_peer_id    = 11;

  // Phase 16: weighted exit pool. If exit_pool is non-empty, the Linux
  // backend installs per-weight mark rules and the packet's numgen
  // decides which exit peer it's routed to. When exit_pool is empty
  // exit_peer_id is used directly.
  repeated int64   exit_pool       = 12;
  repeated int32   exit_weights    = 13;  // same length; weights need
                                          // not sum to anything in
                                          // particular — gmesh normalises

  int64            created_at_unix = 14;
  int64            updated_at_unix = 15;

  // Phase 14: backup_exit_peer_id for path-monitor auto-failover. When
  // pathmon publishes path_down for exit_peer_id, the engine's listener
  // swaps to this peer. Zero disables failover. Independent of the
  // quota BackupProfileID which is budget-driven, not health-driven.
  int64            backup_exit_peer_id = 16;
}

message CreateEgressProfileRequest { EgressProfile profile = 1; }
message UpdateEgressProfileRequest { EgressProfile profile = 1; }
message EgressProfileResponse      { EgressProfile profile = 1; }

message DeleteEgressProfileRequest  { int64 id = 1; }
message DeleteEgressProfileResponse {}

message ListEgressProfilesRequest  {}
message ListEgressProfilesResponse { repeated EgressProfile profiles = 1; }

message EnableExitRequest {
  // Peers permitted to use this node as exit. Empty = allow any authorised
  // mesh peer.
  repeated int64 allowed_peer_ids = 1;
}
message EnableExitResponse  {}

message DisableExitRequest  {}
message DisableExitResponse {}

// ── Ingress profile (Phase 12) ─────────────────────────────────────────

message IngressProfile {
  int64  id               = 1;
  string name             = 2;
  bool   enabled          = 3;

  // Backend — where the real service runs.
  int64  backend_peer_id  = 4;   // mesh peer ID hosting the service
  int64  backend_scope_id = 5;   // 0 = service lives on the peer itself
  string backend_ip       = 6;   // explicit IP (scope mesh_ip or peer mesh_ip)
  uint32 backend_port     = 7;

  // Edge — what this profile publishes.
  int64  edge_peer_id     = 8;   // edge peer that accepts inbound (this daemon)
  uint32 edge_port        = 9;
  string protocol         = 10;  // "tcp" | "udp"

  // Optional source filter: only accept from these CIDRs. Empty = 0.0.0.0/0.
  repeated string allowed_source_cidrs = 11;

  // Phase 20 hook: require mTLS termination at the edge before DNAT.
  bool require_mtls       = 12;

  int64  created_at_unix  = 13;
  int64  updated_at_unix  = 14;
}

message CreateIngressProfileRequest { IngressProfile profile = 1; }
message UpdateIngressProfileRequest { IngressProfile profile = 1; }
message IngressProfileResponse      { IngressProfile profile = 1; }

message DeleteIngressProfileRequest  { int64 id = 1; }
message DeleteIngressProfileResponse {}

message ListIngressProfilesRequest  {}
message ListIngressProfilesResponse { repeated IngressProfile profiles = 1; }

// ── Quota (Phase 13) ──────────────────────────────────────────────────

message Quota {
  int64  id                 = 1;
  string name               = 2;
  bool   enabled            = 3;

  // What this quota watches.
  int64  egress_profile_id  = 4;

  // Time window: "hourly" | "daily" | "weekly" | "monthly".
  string period             = 5;
  int64  limit_bytes        = 6;

  // Fractions 0..1. If multiple thresholds are set and crossed in one
  // evaluation pass, events fire in order warn → shift → stop.
  double warn_at            = 7;
  double shift_at           = 8;
  double stop_at            = 9;

  // Backup profile to swap exit_peer_id to on shift. 0 = no backup.
  int64  backup_profile_id  = 10;

  // Live counters (read-only from client perspective; server overwrites).
  int64  used_bytes         = 11;
  int64  period_start_unix  = 12;
  int64  period_end_unix    = 13;

  // Event latching: once an event fires this period, it won't re-fire
  // until reset/period rollover. Server-managed.
  bool   warn_fired         = 14;
  bool   shift_fired        = 15;
  bool   stop_fired         = 16;

  int64  created_at_unix    = 17;
  int64  updated_at_unix    = 18;

  // Hard stop: when stop_at is crossed, install an nftables DROP rule
  // for the profile's fwmark in table `gmesh-quota`, blocking all
  // matching traffic until the period rolls over or the quota is reset.
  // Default false keeps stop_at event-only so operators can decide.
  bool   hard_stop          = 19;

  // auto_rollback restores the primary profile's exit_peer_id on period
  // rollover or explicit reset when a shift happened during the period.
  // Requires backup_profile_id to be meaningful. Default false leaves
  // the profile on the backup until an operator reverts it.
  bool   auto_rollback      = 20;

  // Server-managed: previous exit_peer_id captured at shift time so
  // auto_rollback can revert. 0 when no shift is active.
  int64  shifted_from_peer_id = 21;
}

message CreateQuotaRequest { Quota quota = 1; }
message UpdateQuotaRequest { Quota quota = 1; }
message QuotaResponse      { Quota quota = 1; }

message DeleteQuotaRequest  { int64 id = 1; }
message DeleteQuotaResponse {}

message ListQuotasRequest  {}
message ListQuotasResponse { repeated Quota quotas = 1; }

message GetQuotaUsageRequest  { int64 id = 1; /* 0 = all */ }
message GetQuotaUsageResponse { repeated Quota quotas = 1; }

message ResetQuotaRequest  { int64 id = 1; }
message ResetQuotaResponse {}

// ── Path Monitor (Phase 14) ───────────────────────────────────────────

message PathState {
  int64  peer_id            = 1;
  string mesh_ip            = 2;
  string status             = 3; // "up" | "down" | "unknown"
  int64  consecutive_ok     = 4;
  int64  consecutive_fail   = 5;
  int64  last_rtt_us        = 6; // microseconds
  double loss_pct           = 7;
  int64  samples            = 8;
  int64  last_sample_unix   = 9;
  int64  last_up_unix       = 10;
  int64  last_down_unix     = 11;
}

message ListPathStatesRequest  {}
message ListPathStatesResponse { repeated PathState states = 1; }

// ── Policies (Phase 17) ───────────────────────────────────────────────

message Policy {
  string name        = 1;
  string source      = 2;
  string event       = 3;  // path_up | path_down | quota_warning | quota_shift | quota_stop
  int64  peer_id     = 4;
  int64  profile_id  = 5;
  int32  debounce_s  = 6;
  int32  min_count   = 7;
  string action      = 8;  // swap_exit_peer | enable_profile | disable_profile | reset_quota
  int64  action_profile_id = 9;
  int64  action_to_peer_id = 10;
  int64  action_quota_id   = 11;
}

message ListPoliciesRequest  {}
message ListPoliciesResponse { repeated Policy policies = 1; }

message ReloadPoliciesRequest  {}
message ReloadPoliciesResponse {
  int64 loaded = 1;
  repeated string errors = 2;
}

// ── L7 classifier (Phase 18) ──────────────────────────────────────────

message L7Flow {
  string src_ip    = 1;
  string dst_ip    = 2;
  uint32 src_port  = 3;
  uint32 dst_port  = 4;
  string l4_proto  = 5;
  string l7_proto  = 6;  // "http" | "tls" | "ssh" | "dns" | "unknown" | …
  double confidence = 7; // 0..1
  int64  rx_bytes  = 8;
  int64  tx_bytes  = 9;
  int64  peer_id   = 10; // 0 = off-mesh
  int64  last_seen_unix = 11;
}

message L7Total {
  int64  peer_id   = 1;
  string l7_proto  = 2;
  int64  bytes     = 3;
  int64  flows     = 4;
}

message ListL7FlowsRequest  { int64 peer_id = 1; }
message ListL7FlowsResponse { repeated L7Flow flows = 1; }

message ListL7TotalsRequest  { int64 peer_id = 1; }
message ListL7TotalsResponse { repeated L7Total totals = 1; }

// ── Anomaly alerts (Phase 21) ────────────────────────────────────────

message Anomaly {
  string detector    = 1;  // "bandwidth_z" | "handshake_storm" | "peer_flap"
  int64  peer_id     = 2;
  string severity    = 3;  // "info" | "warn" | "critical"
  string message     = 4;
  map<string, double> metrics = 5;
  int64  observed_unix = 6;
}

message ListAnomaliesRequest {
  int64  peer_id = 1; // 0 = all
  int32  limit   = 2; // 0 = all
}
message ListAnomaliesResponse { repeated Anomaly alerts = 1; }

// ── Circuits / onion paths (Phase 19) ────────────────────────────────

message Circuit {
  int64          id         = 1;
  string         name       = 2;
  bool           enabled    = 3;
  int32          priority   = 4;
  int64          source     = 5;
  repeated int64 hops       = 6;
  string         protocol   = 7;   // "any" | "tcp" | "udp"
  string         dest_cidr  = 8;
  string         dest_ports = 9;
  int64          created_at_unix = 10;
  int64          updated_at_unix = 11;
}

message CreateCircuitRequest { Circuit circuit = 1; }
message UpdateCircuitRequest { Circuit circuit = 1; }
message CircuitResponse      { Circuit circuit = 1; }

message DeleteCircuitRequest  { int64 id = 1; }
message DeleteCircuitResponse {}

message ListCircuitsRequest  {}
message ListCircuitsResponse { repeated Circuit circuits = 1; }

// ── mTLS / SPIFFE (Phase 20) ──────────────────────────────────────────

message InitCARequest {
  string trust_domain = 1; // default "gmesh.local"
  bool   force        = 2; // overwrite existing CA
}
message InitCAResponse {
  string ca_pem       = 1;
  string trust_domain = 2;
}

message CAStatusRequest  {}
message CAStatusResponse {
  bool   loaded       = 1;
  string trust_domain = 2;
  string ca_pem       = 3;
  int64  issued_count = 4;
  int64  revoked_count = 5;
}

message IssueCertRequest {
  int64  peer_id       = 1;
  string common_name   = 2;
  repeated string dns_names = 3;
  repeated string ip_addrs  = 4;
  string spiffe_id     = 5; // empty = auto-generate spiffe://<trust>/peer/<id>
  int64  validity_days = 6; // 0 = 90 days default
}

message IssuedCert {
  string serial      = 1;
  int64  peer_id     = 2;
  string common_name = 3;
  string spiffe_id   = 4;
  string cert_pem    = 5;
  string key_pem     = 6; // private key, returned ONLY on issue
  string ca_pem      = 7;
  int64  not_before_unix = 8;
  int64  not_after_unix  = 9;
}

message IssueCertResponse { IssuedCert cert = 1; }

message CertSummary {
  string serial      = 1;
  int64  peer_id     = 2;
  string common_name = 3;
  string spiffe_id   = 4;
  int64  not_before_unix = 5;
  int64  not_after_unix  = 6;
  bool   revoked         = 7;
  int64  revoked_at_unix = 8;
  string revoke_reason   = 9;
}

message ListCertsRequest  { int64 peer_id = 1; /* 0 = all */ }
message ListCertsResponse { repeated CertSummary certs = 1; }

message RevokeCertRequest  {
  string serial = 1;
  string reason = 2;
}
message RevokeCertResponse {}

message ExportTrustRequest  {}
message ExportTrustResponse {
  string ca_pem       = 1;
  string trust_domain = 2;
}
