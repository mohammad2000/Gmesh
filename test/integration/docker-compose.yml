# Skeleton integration harness. Real tests land in Phase 2+.
#
# Runs 3 gmeshd instances in separate containers behind simulated NAT,
# then a "runner" container issues RPCs and asserts the expected mesh state.
version: "3.9"

services:
  node-a:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    sysctls:
      net.ipv4.ip_forward: 1
    command: ["gmeshd", "--config", "/etc/gmesh/config.yaml"]
    environment:
      NODE_NAME: a

  node-b:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    sysctls:
      net.ipv4.ip_forward: 1
    command: ["gmeshd", "--config", "/etc/gmesh/config.yaml"]
    environment:
      NODE_NAME: b

  node-c:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    sysctls:
      net.ipv4.ip_forward: 1
    command: ["gmeshd", "--config", "/etc/gmesh/config.yaml"]
    environment:
      NODE_NAME: c

  runner:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile.runner
    depends_on: [node-a, node-b, node-c]
    command: ["/usr/local/bin/run-integration-tests.sh"]
